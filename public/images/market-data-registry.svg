<svg width="700" height="500" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0202" />
      <stop offset="100%" stop-color="#400505" />
    </linearGradient>
    <linearGradient id="candleUp" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#404df7" />
      <stop offset="100%" stop-color="#8892ff" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8892ff" />
      <stop offset="100%" stop-color="#404df7" />
    </linearGradient>
  </defs>

  <rect width="700" height="500" fill="url(#bgGrad2)" />

  <!-- binary rain background -->
  <g fill="#404df733" font-family="monospace" font-size="14">
    <text x="30" y="40">01001</text>
    <text x="30" y="460">11010</text>
    <text x="600" y="40">10110</text>
    <text x="600" y="460">00101</text>
    <text x="330" y="40">01100</text>
  </g>

  <!-- candlestick chart -->
  <g transform="translate(90,230)">
    <line x1="10" y1="-60" x2="10" y2="60" stroke="#8892ff" stroke-width="2" />
    <rect x="0" y="-30" width="20" height="60" fill="url(#candleUp)" />

    <line x1="60" y1="-90" x2="60" y2="40" stroke="#8892ff" stroke-width="2" />
    <rect x="50" y="-70" width="20" height="80" fill="url(#candleUp)" />

    <line x1="110" y1="-40" x2="110" y2="70" stroke="#ff7a7a" stroke-width="2" />
    <rect x="100" y="-10" width="20" height="60" fill="#ff7a7a" />

    <line x1="160" y1="-110" x2="160" y2="20" stroke="#8892ff" stroke-width="2" />
    <rect x="150" y="-90" width="20" height="90" fill="url(#candleUp)" />

    <line x1="210" y1="-50" x2="210" y2="60" stroke="#ff7a7a" stroke-width="2" />
    <rect x="200" y="-20" width="20" height="50" fill="#ff7a7a" />
  </g>

  <!-- obfuscation arrows: raw ticker -> registry -> resolved id -->
  <g font-family="Geist, sans-serif" font-size="15" fill="#eae5ec">
    <rect x="60" y="330" width="110" height="40" rx="8" fill="#ffffff12" stroke="#ffffff40" />
    <text x="75" y="355">AAPL</text>

    <path d="M175 350 L235 350" stroke="#c2a4ff" stroke-width="2" marker-end="url(#arrow)" />

    <rect x="240" y="320" width="140" height="60" rx="10" fill="#404df7" opacity="0.85" />
    <text x="260" y="345" fill="#fff">Registry</text>
    <text x="260" y="365" fill="#dfe1ff" font-size="12">X7Q-91Z-AF3</text>

    <path d="M385 350 L445 350" stroke="#c2a4ff" stroke-width="2" marker-end="url(#arrow)" />

    <rect x="450" y="330" width="120" height="40" rx="8" fill="#ffffff12" stroke="#ffffff40" />
    <text x="470" y="355">AAPL</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c2a4ff" />
    </marker>
  </defs>

  <!-- padlock -->
  <g transform="translate(600,150)">
    <rect x="-28" y="0" width="56" height="46" rx="8" fill="url(#lockGrad)" />
    <path d="M-16 0 v-18 a16 16 0 0 1 32 0 v18" fill="none" stroke="#eae5ec" stroke-width="6" />
    <circle cx="0" cy="22" r="6" fill="#1a0202" />
  </g>

  <text x="40" y="60" font-family="Geist, sans-serif" font-size="30" font-weight="600" fill="#eae5ec">
    Secure Market Data
  </text>
  <text x="40" y="90" font-family="Geist, sans-serif" font-size="16" fill="#c2a4ff">
    yfinance • Obfuscation • Registry-Based ID Resolution
  </text>
</svg>
