<svg width="700" height="500" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#400505" />
      <stop offset="100%" stop-color="#1a0202" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8892ff" />
      <stop offset="100%" stop-color="#404df7" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee081" />
      <stop offset="100%" stop-color="#404df7" />
    </linearGradient>
  </defs>

  <rect width="700" height="500" fill="url(#bgGrad3)" />

  <!-- subtle grid -->
  <g stroke="#ffffff10" stroke-width="1">
    <line x1="0" y1="125" x2="700" y2="125" />
    <line x1="0" y1="250" x2="700" y2="250" />
    <line x1="0" y1="375" x2="700" y2="375" />
    <line x1="175" y1="0" x2="175" y2="500" />
    <line x1="350" y1="0" x2="350" y2="500" />
    <line x1="525" y1="0" x2="525" y2="500" />
  </g>

  <!-- dashboard card: subjects list -->
  <g transform="translate(60,150)">
    <rect width="230" height="230" rx="14" fill="#ffffff10" stroke="#ffffff30" />
    <text x="18" y="32" font-family="Geist, sans-serif" font-size="14" fill="#c2a4ff">Subjects</text>
    <rect x="18" y="50" width="194" height="14" rx="7" fill="url(#cardGrad)" opacity="0.9" />
    <rect x="18" y="78" width="150" height="14" rx="7" fill="url(#cardGrad)" opacity="0.7" />
    <rect x="18" y="106" width="170" height="14" rx="7" fill="url(#cardGrad)" opacity="0.5" />
    <rect x="18" y="134" width="120" height="14" rx="7" fill="url(#cardGrad)" opacity="0.35" />

    <!-- progress ring -->
    <g transform="translate(115,195)">
      <circle r="30" fill="none" stroke="#ffffff20" stroke-width="8" />
      <circle r="30" fill="none" stroke="url(#ringGrad)" stroke-width="8"
        stroke-dasharray="141 189" stroke-linecap="round" transform="rotate(-90)" />
      <text x="0" y="5" text-anchor="middle" font-family="Geist, sans-serif" font-size="14" fill="#eae5ec">75%</text>
    </g>
  </g>

  <!-- weekly bar chart of study hours -->
  <g transform="translate(340,340)">
    <rect x="0" y="-40" width="22" height="40" rx="3" fill="url(#cardGrad)" />
    <rect x="30" y="-70" width="22" height="70" rx="3" fill="url(#cardGrad)" />
    <rect x="60" y="-30" width="22" height="30" rx="3" fill="url(#cardGrad)" />
    <rect x="90" y="-90" width="22" height="90" rx="3" fill="url(#cardGrad)" />
    <rect x="120" y="-55" width="22" height="55" rx="3" fill="url(#cardGrad)" />
    <rect x="150" y="-75" width="22" height="75" rx="3" fill="url(#cardGrad)" />
    <rect x="180" y="-20" width="22" height="20" rx="3" fill="url(#cardGrad)" />
  </g>
  <text x="340" y="255" font-family="Geist, sans-serif" font-size="13" fill="#c2a4ff">Weekly Study Hours</text>

  <!-- AI assistant chat bubble -->
  <g transform="translate(520,150)">
    <rect width="150" height="90" rx="16" fill="#ffffff12" stroke="#ffffff30" />
    <circle cx="24" cy="24" r="10" fill="url(#ringGrad)" />
    <path d="M14 24 h20 M14 32 h20 M14 40 h12" stroke="#ffffff" stroke-width="0" />
    <rect x="14" y="42" width="122" height="8" rx="4" fill="#ffffff30" />
    <rect x="14" y="56" width="90" height="8" rx="4" fill="#ffffff20" />
    <path d="M60 90 l-14 16 v-16 Z" fill="#ffffff12" />
    <text x="42" y="30" font-family="Geist, sans-serif" font-size="12" fill="#eae5ec">Gemini AI</text>
  </g>

  <!-- exercise/wellness icon -->
  <g transform="translate(555,300)">
    <circle r="34" fill="#ffffff10" stroke="#7ee081" stroke-width="2" />
    <path d="M-14 6 l10 -16 l8 10 l10 -14" stroke="#7ee081" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <text x="40" y="60" font-family="Geist, sans-serif" font-size="30" font-weight="600" fill="#eae5ec">
    AI Student Manager Pro
  </text>
  <text x="40" y="90" font-family="Geist, sans-serif" font-size="16" fill="#c2a4ff">
    Streamlit • Gemini AI • Study &amp; Progress Tracking
  </text>
</svg>
